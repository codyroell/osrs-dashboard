<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OSRS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#040d18;--b1:#1a4a6a;--b2:#2a6a9a;--ac:#7ec8e3;--br:#b8ecff;--dm:#4a8aaa;--mt:#2a5a7a;--tx:#d0eeff;--t2:#8ac4e0;--f1:rgba(126,200,227,0.07);--f2:rgba(126,200,227,0.14);--gn:#50c878;--gnb:rgba(30,100,60,0.18);--rd:#e07070;--rdb:rgba(139,26,26,0.18);--pu:#b090d8;--go:#d4a843;--or:#e8954a;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);min-height:100vh;color:var(--tx);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 15% 15%,rgba(126,200,227,0.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(100,160,220,0.04) 0%,transparent 55%),url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%237ec8e3' stroke-width='0.35' opacity='0.055'%3E%3Cpolygon points='40,4 54,19 54,35 40,45 26,35 26,19'/%3E%3Cline x1='40' y1='4' x2='40' y2='45'/%3E%3Cline x1='26' y1='19' x2='54' y2='35'/%3E%3Cline x1='54' y1='19' x2='26' y2='35'/%3E%3C/g%3E%3C/svg%3E") repeat;}
#app{max-width:980px;margin:0 auto;padding:0 0 60px;position:relative;z-index:1;}
.header{border-bottom:2px solid var(--b2);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(4,13,24,0.97),rgba(7,21,37,0.97));position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);box-shadow:0 2px 20px rgba(126,200,227,0.08);}
.hl{display:flex;align-items:center;gap:12px;}
.hcrown{font-size:24px;filter:drop-shadow(0 0 8px rgba(126,200,227,0.7));}
.htitle{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--br);letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 18px rgba(126,200,227,0.5);}
.hsub{font-size:11px;color:var(--dm);letter-spacing:1px;font-family:'Cinzel',serif;margin-top:3px;}
.hr2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sdot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:all 0.3s;}
.sdot.ok{background:var(--gn);box-shadow:0 0 6px var(--gn);}
.sdot.err{background:var(--rd);}
.sdot.busy{background:var(--go);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.wbanner{margin:10px 16px 0;padding:9px 14px;border:1px solid var(--b2);border-radius:3px;background:linear-gradient(90deg,rgba(126,200,227,0.06),rgba(126,200,227,0.02));font-family:'Cinzel',serif;font-size:11px;color:var(--t2);letter-spacing:0.5px;text-align:center;}
.wbanner strong{color:var(--br);font-size:13px;text-shadow:0 0 10px rgba(126,200,227,0.4);}
.pbar{display:flex;align-items:center;gap:6px;padding:8px 16px 0;flex-wrap:wrap;}
.pchip{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.5px;padding:4px 10px;border:1px solid var(--b1);border-radius:12px;cursor:pointer;color:var(--dm);background:transparent;transition:all 0.15s;}
.pchip.active{border-color:var(--ac);color:var(--ac);background:var(--f2);}
.irow{display:flex;gap:8px;padding:10px 16px 0;}
input[type="text"],input[type="password"]{flex:1;background:rgba(4,13,24,0.75);border:1px solid var(--b1);border-radius:3px;padding:8px 12px;color:var(--tx);font-family:'Crimson Pro',Georgia,serif;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--ac);}
.btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;padding:8px 14px;border:1px solid var(--b2);background:var(--f2);color:var(--br);border-radius:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.btn:hover{background:rgba(126,200,227,0.24);}
.btn:disabled{opacity:0.4;cursor:default;}
.btn-sm{font-size:9px;padding:5px 10px;}
.btn-danger{border-color:rgba(224,112,112,0.4);color:var(--rd);}
.btn-danger:hover{background:var(--rdb);}
.btn-green{border-color:rgba(80,200,120,0.4);color:var(--gn);}
.btn-green:hover{background:var(--gnb);}
.tabs{display:flex;border-bottom:1px solid var(--b1);background:rgba(4,13,24,0.65);margin-top:10px;overflow-x:auto;}
.tab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:11px 0;cursor:pointer;border:none;flex:1;min-width:65px;background:transparent;color:var(--dm);border-bottom:2px solid transparent;opacity:0.55;transition:all 0.2s;}
.tab.active{opacity:1;border-bottom:2px solid var(--ac);background:var(--f1);color:var(--br);}
.tab:hover{opacity:0.85;color:var(--ac);}
.panel{display:none;padding:16px;}
.panel.active{display:block;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
@media(max-width:500px){.sgrid{grid-template-columns:repeat(2,1fr);}}
.sbox{border:1px solid var(--b1);border-radius:3px;padding:10px 8px;text-align:center;background:var(--f1);}
.snum{font-family:'Cinzel',serif;font-size:18px;color:var(--br);font-weight:700;text-shadow:0 0 10px rgba(126,200,227,0.35);}
.slbl{font-size:10px;color:var(--dm);letter-spacing:0.5px;margin-top:2px;}
.pw{margin-bottom:9px;}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--ac);margin-bottom:4px;font-family:'Cinzel',serif;letter-spacing:1px;}
.pb{height:5px;background:rgba(126,200,227,0.07);border-radius:3px;border:1px solid var(--b1);overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--mt),var(--ac),var(--br));transition:width 0.6s ease;box-shadow:0 0 5px rgba(126,200,227,0.35);}
.st{font-family:'Cinzel',serif;font-size:11px;color:var(--ac);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.st::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b1),transparent);}
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.fbtn{font-family:'Cinzel',serif;font-size:9px;padding:3px 9px;border:1px solid var(--b1);background:transparent;color:var(--dm);border-radius:2px;cursor:pointer;opacity:0.6;transition:all 0.15s;}
.fbtn.active,.fbtn:hover{opacity:1;background:var(--f2);border-color:var(--ac);color:var(--ac);}
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
@media(max-width:520px){.bgrid{grid-template-columns:1fr;}}
.bcard{border:1px solid var(--b1);border-radius:3px;padding:10px 10px 8px;background:rgba(7,21,37,0.55);position:relative;}
.bcard.hkc{border-color:#1a5a3a;background:rgba(10,36,24,0.35);}
.kbadge{position:absolute;top:8px;right:8px;font-size:10px;font-family:'Cinzel',serif;padding:1px 6px;border-radius:2px;}
.kbadge.hkc{background:rgba(20,80,50,0.55);border:1px solid #1a5a3a;color:var(--gn);}
.kbadge.nkc{background:rgba(10,30,50,0.45);border:1px solid var(--b1);color:var(--dm);}
.bname{font-family:'Cinzel',serif;font-size:11px;color:var(--br);font-weight:600;margin-bottom:1px;padding-right:62px;}
.bcat{font-size:10px;color:var(--t2);opacity:0.65;margin-bottom:5px;}
.bdrop{display:flex;justify-content:space-between;font-size:10px;padding:1px 0;gap:4px;}
.bdrop.ob{color:var(--gn);opacity:0.75;text-decoration:line-through;}
.bdrop.ms{color:var(--t2);opacity:0.5;}
.bdrop.pt{color:var(--pu);opacity:0.5;}
.bdrop.pt.ob{color:var(--pu);opacity:0.8;text-decoration:line-through;}
.bge{opacity:0.5;white-space:nowrap;}
.ir{display:flex;align-items:center;gap:10px;padding:6px 10px;border:1px solid transparent;border-radius:3px;margin-bottom:2px;transition:background 0.1s;}
.ir:hover{border-color:var(--b1);background:var(--f1);}
.ir.ob{border-color:rgba(26,90,58,0.25);background:var(--gnb);}
.cb{width:12px;height:12px;border:1px solid var(--b1);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gn);background:rgba(4,13,24,0.5);}
.cb.ck{background:rgba(20,80,50,0.4);border-color:#1a6a3a;}
.in{font-size:12px;color:var(--tx);flex:1;}
.in.ot{color:var(--t2);opacity:0.4;text-decoration:line-through;}
.in.pn{color:var(--pu);}
.igp{font-size:10px;color:var(--go);opacity:0.7;white-space:nowrap;}
.pill{font-size:9px;font-family:'Cinzel',serif;padding:2px 6px;border-radius:2px;white-space:nowrap;}
.pi{border:1px solid rgba(126,200,227,0.25);background:rgba(126,200,227,0.07);color:var(--ac);}
.pg{border:1px solid rgba(80,200,120,0.25);background:rgba(80,200,120,0.07);color:var(--gn);}
.pp{border:1px solid rgba(176,144,216,0.25);background:rgba(176,144,216,0.07);color:var(--pu);}
.pgo{border:1px solid rgba(212,168,67,0.25);background:rgba(212,168,67,0.07);color:var(--go);}
.tlbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:7px 0 3px;color:var(--ac);opacity:0.7;margin-top:4px;}
.div{height:1px;background:linear-gradient(90deg,var(--b1),transparent);margin:10px 0;}
.mc{border:1px solid var(--b1);border-radius:3px;padding:10px 12px;background:rgba(7,21,37,0.45);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.mc:hover{border-color:var(--b2);}
.ml{display:flex;align-items:center;gap:10px;flex:1;}
.rc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:10px;flex-shrink:0;font-weight:700;}
.mn{font-family:'Cinzel',serif;font-size:11px;color:var(--br);}
.ms2{font-size:10px;color:var(--t2);opacity:0.7;}
.mr2{text-align:right;}
.mg{font-family:'Cinzel',serif;font-size:13px;color:var(--br);}
.abox{border:1px solid var(--b1);border-radius:3px;padding:12px;margin-bottom:10px;background:rgba(4,13,24,0.55);}
.arow{display:flex;gap:8px;}
.albl{font-size:10px;color:var(--ac);font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:8px;opacity:0.8;}
.aresp{font-size:13px;line-height:1.75;color:var(--tx);white-space:pre-wrap;}
.qq{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid transparent;border-radius:3px;margin-bottom:4px;cursor:pointer;transition:all 0.15s;}
.qq:hover{border-color:var(--b1);background:var(--f1);}
.qq span{font-size:12px;color:var(--t2);}
.ebox{margin:10px 16px;padding:10px 14px;color:var(--rd);font-family:'Cinzel',serif;font-size:11px;border:1px solid rgba(224,112,112,0.3);border-radius:3px;background:var(--rdb);}
.sbox2{margin:10px 16px;padding:10px 14px;color:var(--gn);font-family:'Cinzel',serif;font-size:11px;border:1px solid rgba(80,200,120,0.3);border-radius:3px;background:var(--gnb);}
.spin{width:14px;height:14px;border:2px solid var(--b1);border-top-color:var(--ac);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.note{font-size:11px;color:var(--mt);font-style:italic;margin-top:6px;}
.sb{width:100%;background:rgba(4,13,24,0.65);border:1px solid var(--b1);border-radius:3px;padding:7px 11px;color:var(--tx);font-family:'Crimson Pro',Georgia,serif;font-size:13px;outline:none;margin-bottom:10px;}
.sb:focus{border-color:var(--ac);}
.gstep{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.gnum{width:22px;height:22px;border-radius:50%;background:var(--f2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:10px;color:var(--ac);flex-shrink:0;}
.gtxt{font-size:13px;color:var(--t2);line-height:1.6;}
.gtxt a{color:var(--ac);}
.gtxt code{background:rgba(126,200,227,0.1);border:1px solid rgba(126,200,227,0.2);padding:1px 5px;border-radius:2px;font-size:11px;color:var(--br);}
.col-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.col-tab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--b1);border-radius:3px;cursor:pointer;color:var(--dm);background:transparent;transition:all 0.15s;opacity:0.6;}
.col-tab.active{opacity:1;border-color:var(--ac);color:var(--ac);background:var(--f2);}
.col-sb{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--b1);border-radius:3px;background:var(--f1);margin-bottom:12px;flex-wrap:wrap;}
.csnum{font-family:'Cinzel',serif;font-size:16px;color:var(--br);font-weight:700;}
.cslbl{font-size:9px;color:var(--dm);}
.csdiv{width:1px;height:30px;background:var(--b1);}
.cat-hdr{display:flex;align-items:center;padding:7px 0 3px;}
.cat-hdr-name{font-family:'Cinzel',serif;font-size:11px;color:var(--br);letter-spacing:1px;min-width:160px;}
.cat-hdr-bar{flex:1;margin:0 10px;height:3px;background:rgba(126,200,227,0.1);border-radius:2px;overflow:hidden;}
.cat-hdr-fill{height:100%;background:var(--ac);transition:width 0.4s;}
.cat-hdr-cnt{font-size:10px;color:var(--dm);white-space:nowrap;}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:3px;margin-bottom:6px;}
.ic{font-size:10px;padding:3px 8px;border-radius:2px;border:1px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ic.have{background:rgba(20,80,50,0.25);border-color:rgba(26,90,58,0.3);color:var(--gn);}
.ic.need{background:rgba(10,30,50,0.3);border-color:rgba(26,74,106,0.2);color:var(--t2);}
.tglbtn{font-family:'Cinzel',serif;font-size:9px;padding:3px 8px;border:1px solid var(--b1);border-radius:2px;cursor:pointer;color:var(--dm);background:transparent;transition:all 0.15s;white-space:nowrap;}
.tglbtn.active{border-color:var(--ac);color:var(--ac);background:var(--f2);}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="hl">
      <span class="hcrown">❄</span>
      <div>
        <div class="htitle" id="htitle">Southp0le</div>
        <div class="hsub" id="hsub">Loading...</div>
      </div>
    </div>
    <div class="hr2">
      <div class="sdot" id="sdot"></div>
      <span id="spinhdr" class="spin" style="display:none"></span>
      <button class="btn btn-sm" onclick="saveToGist()">❄ Save</button>
      <button class="btn btn-sm btn-green" onclick="syncColLog()">↻ Col Log</button>
      <button class="btn btn-sm" onclick="refreshWOM()">↻ KC</button>
    </div>
  </div>
  <div class="wbanner" id="wbanner">Welcome back, <strong>Southp0le</strong> &nbsp;·&nbsp; Maxed Main &nbsp;·&nbsp; ❄ Press ↻ Col Log to sync your full collection log</div>
  <div class="pbar" id="pbar"></div>
  <div class="irow">
    <input type="text" id="rsn" value="Southp0le" placeholder="RSN..." onkeydown="if(event.key==='Enter')addProfile()"/>
    <button class="btn" onclick="addProfile()">Load</button>
    <button class="btn btn-sm" onclick="addProfile()">+ Profile</button>
  </div>
  <div id="ebox" class="ebox" style="display:none"></div>
  <div id="sbox" class="sbox2" style="display:none"></div>
  <div class="tabs">
    <button class="tab active" onclick="sw('dashboard',this)">Dashboard</button>
    <button class="tab" onclick="sw('collog',this)">Collection Log</button>
    <button class="tab" onclick="sw('pets',this)">Pets</button>
    <button class="tab" onclick="sw('money',this)">GP/hr</button>
    <button class="tab" onclick="sw('advisor',this)">AI Advisor</button>
    <button class="tab" onclick="sw('settings',this)">⚙ Settings</button>
  </div>
  <div id="panel-dashboard" class="panel active"></div>
  <div id="panel-collog" class="panel"></div>
  <div id="panel-pets" class="panel"></div>
  <div id="panel-money" class="panel"></div>
  <div id="panel-advisor" class="panel"></div>
  <div id="panel-settings" class="panel"></div>
</div>
<script>

async function saveToGist(silent=false){

  try{

    else{r=await fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":`token ${gistToken}`,"Content-Type":"application/json"},body:JSON.stringify(body)});if(r.ok){const d=await r.json();gistId=d.id;ls("gist_id",gistId);}}
    if(r.ok){dot("ok");if(!silent)ok("Saved to Gist ✓");}else{dot("err");if(!silent)err("Gist save failed.");}
  }catch{dot("err");if(!silent)err("Network error.");}
}
async function loadFromGist(){
  if(!gistToken||!gistId){err("Token+ID required.");return;}
  dot("busy");spin(true);
  try{
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{"Authorization":`token ${gistToken}`}});
    if(!r.ok)throw 0;
    const d=await r.json();const c=d.files["osrs.json"]?.content;if(!c)throw 0;
    const x=JSON.parse(c);
    if(x.profiles)profiles=x.profiles;
    if(x.ob)colObtained=new Set(x.ob);
    if(x.colSync)colSync=x.colSync;
    persist();dot("ok");ok("Loaded from Gist ✓");renderAll();
  }catch{dot("err");err("Could not load from Gist.");}
  finally{spin(false);}
}

// ─── TEMPLE SYNC ─────────────────────────────────────────────────────────────
async function syncColLog(){
  spin(true);ok("Syncing from TempleOSRS...");
  const nm=document.getElementById("rsn").value.trim()||activeRsn;
  try{
    // Fetch item map and categories if needed
    if(!colItems){
      const r=await fetch(`${TEMPLE}/items.php`);
      if(!r.ok)throw new Error("items.php failed");
      const raw=await r.json();
      // Temple returns { "id": "name", ... } or { data: {...} }
      colItems=raw.data||raw;
      ls("col_items",colItems);
    }
    if(!colCats){
      const r=await fetch(`${TEMPLE}/categories.php`);
      if(!r.ok)throw new Error("categories.php failed");
      const raw=await r.json();
      colCats=raw.data||raw;
      ls("col_cats",colCats);
    }
    // Fetch player items
    const r=await fetch(`${TEMPLE}/player_collection_log.php?player=${encodeURIComponent(nm)}&categories=all`);
    if(!r.ok)throw new Error(`Player fetch failed (${r.status}) — sync in-game first`);
    const raw=await r.json();
    const data=raw.data||raw;
    const newOb=new Set();
    // Handle various response shapes
    function extractIds(obj){
      if(Array.isArray(obj)){obj.forEach(id=>newOb.add(Number(id)));}
      else if(typeof obj==="object"&&obj){
        Object.entries(obj).forEach(([k,v])=>{
          if(typeof v==="object"&&v!==null){
            if(v.items)extractIds(v.items);
            else extractIds(v);
          } else if(!isNaN(Number(k))&&(v===true||v===1||typeof v==="number")){
            newOb.add(Number(k));
          }
        });
      }
    }
    extractIds(data);
    if(newOb.size>100){
      colObtained=newOb;
      ok(`Collection log synced! ${colObtained.size.toLocaleString()} items ✓`);
    } else {
      // Merge with existing
      WSIDS.forEach(id=>colObtained.add(id));
      err("TempleOSRS returned limited data — using WikiSync seed. Re-sync in-game and try again.");
    }
    colSync=new Date().toISOString();
    persist();sched();renderAll();
  }catch(e){
    err("Sync error: "+e.message);
    WSIDS.forEach(id=>colObtained.add(id));
    renderAll();
  }finally{spin(false);}
}

function renderFullCol(sq){
  const allCatNames=Object.keys(colCats);
  const assigned=new Set([...TAB_MAP.Bosses,...TAB_MAP.Raids,...TAB_MAP.Clues,...TAB_MAP.Minigames]);
  const other=allCatNames.filter(c=>!assigned.has(c));
  const tabCats={...TAB_MAP,Other:other}[colTab]||[];
  const active=tabCats.filter(c=>colCats[c]);

  let tabTot=0,tabOb=0;
  active.forEach(c=>{const items=colCats[c]||[];tabTot+=items.length;tabOb+=items.filter(id=>colObtained.has(Number(id))).length;});
  const tpct=tabTot>0?Math.round(tabOb/tabTot*100):0;

  let h=`<div class="pw"><div class="pl"><span>${colTab}</span><span>${tabOb.toLocaleString()}/${tabTot.toLocaleString()} (${tpct}%)</span></div><div class="pb"><div class="pf" style="width:${tpct}%"></div></div></div>`;

  active.forEach(catName=>{
    const items=(colCats[catName]||[]).map(Number);if(!items.length)return;
    const got=items.filter(id=>colObtained.has(id));
    const missing=items.filter(id=>!colObtained.has(id));
    const pct=Math.round(got.length/items.length*100);
    const display=(showMiss?missing:items).filter(id=>{
      if(!sq)return true;
      const nm=(colItems[String(id)]||colItems[id]||"id:"+id).toLowerCase();
      return nm.includes(sq)||catName.toLowerCase().includes(sq);
    });
    if(!display.length&&sq)return;
    h+=`<div>
      <div class="cat-hdr">
        <div class="cat-hdr-name">${catName}</div>
        <div class="cat-hdr-bar"><div class="cat-hdr-fill" style="width:${pct}%"></div></div>

      </div>
      <div class="item-grid">${display.map(id=>{
        const hv=colObtained.has(id);

        return`<div class="ic ${hv?"have":"need"}" title="${nm}">${hv?"✓ ":""}${nm}</div>`;
      }).join("")}</div>
    </div>`;
  });
  if(!active.length)h+=`<p class="note" style="padding:20px 0">No categories found for this tab. Try syncing again.</p>`;

}

    let ch="";
    catBosses.forEach(b=>{
      const drops=b.drops.filter(d=>!d.pet&&(!sq||d.n.toLowerCase().includes(sq)||b.name.toLowerCase().includes(sq)));
      if(!drops.length)return;
      const allD=b.drops.filter(d=>!d.pet);const gotC=allD.filter(d=>d.i&&colObtained.has(d.i)).length;
      ch+=`<div style="font-family:'Cinzel',serif;font-size:11px;color:var(--ac);padding:4px 0 2px">${b.name} <span style="opacity:0.4">(${fkc(kc(b.id))} KC · ${gotC}/${allD.length})</span></div>`;
      drops.filter(d=>!showMiss||(d.i&&!colObtained.has(d.i))).forEach(d=>{
        const hv=d.i?colObtained.has(d.i):false;
        ch+=`<div class="ir${hv?" ob":""}"><div class="cb${hv?" ck":""}">${hv?"✓":""}</div><span class="in${hv?" ot":""}">${d.n}</span>${d.ge>0?`<span class="igp">${fmt(d.ge)}</span>`:""}<span class="pill pi">${b.name}</span></div>`;
      });
    });
    if(ch)h+=`<div class="tlbl">${cat}</div>${ch}<div class="div"></div>`;
  });
  return h;
}
function setColTab(t){colTab=t;rCol();}

// ─── PETS ────────────────────────────────────────────────────────────────────
function rPets(){
  const p=P();
  const all=BOSSES.flatMap(b=>b.drops.filter(d=>d.pet).map(d=>({n:d.n,boss:b.name,cat:b.cat,bid:b.id})));
  const tot=all.length,got=all.filter(x=>p.pets[x.n]).length,pct=Math.round(got/tot*100);
  let h=`<div class="pw"><div class="pl"><span>🐾 Boss Pets</span><span>${got}/${tot} (${pct}%)</span></div><div class="pb"><div class="pf" style="width:${pct}%"></div></div></div>`;
  BCATS.slice(1).forEach(cat=>{
    const pets=all.filter(x=>x.cat===cat);if(!pets.length)return;
    h+=`<div class="tlbl">${cat}</div>`;
    pets.forEach(x=>{const hv=!!p.pets[x.n];const k2=kc(x.bid);
      h+=`<div class="ir${hv?" ob":""}" onclick="togglePet('${x.n.replace(/'/g,"\\'")}')"><div class="cb${hv?" ck":""}">${hv?"✓":""}</div><span class="in pn${hv?" ot":""}">${x.n}</span>${k2>0?`<span style="font-size:10px;color:var(--dm)">${fkc(k2)} KC</span>`:""}<span class="pill pp">${x.boss}</span></div>`;
    });
  });
  h+=`<p class="note" style="margin-top:6px">🐾 Good luck, Southp0le! Click to mark obtained</p>`;
  document.getElementById("panel-pets").innerHTML=h;
}
function togglePet(n){const p=P();p.pets[n]=!p.pets[n];persist();sched();renderAll();}

// ─── GP/HR ───────────────────────────────────────────────────────────────────
function rMoney(){
  const ranked=[...BOSSES].filter(b=>b.gphr>0).map(b=>{
    const k2=kc(b.id),miss=b.drops.filter(d=>!d.pet&&d.i&&!colObtained.has(d.i)),mv=miss.reduce((s,d)=>s+d.ge,0);
    return{...b,k2,miss,mv,score:b.gphr*(mv>0?1.5:1)};
  }).sort((a,b)=>b.score-a.score);
  const rc=["#d4a843","#a0a0a0","#c07840"];
  let h=`<div class="st">❄ GP/hr Priority — ${activeRsn}</div>
  <p style="font-size:11px;color:var(--t2);opacity:0.65;margin-bottom:12px;font-style:italic">Weighted by missing drops · Assumes BIS gear</p>`;
  ranked.forEach((b,i)=>{
    const c=i<3?rc[i]:"rgba(26,74,106,0.55)",tc=i<3?"#f0f0f0":"var(--ac)";
    h+=`<div class="mc"><div class="ml"><div class="rc" style="background:${c};color:${tc}">${i+1}</div><div><div class="mn">${b.name}</div><div class="ms2">${b.k2>0?fkc(b.k2)+" KC · ":"No KC · "}${b.cat}</div></div></div><div class="mr2"><div class="mg">~${b.gphr}M/hr</div>${b.miss.length?`<div style="font-size:9px;color:var(--rd)">${b.miss.length} unique${b.miss.length>1?"s":""} missing</div>`:""}${b.mv?`<div style="font-size:9px;color:var(--go)">${fmt(b.mv)} in drops</div>`:""}</div></div>`;
  });
  document.getElementById("panel-money").innerHTML=h;
}

// ─── AI ──────────────────────────────────────────────────────────────────────
function rAdvisor(){
  document.getElementById("panel-advisor").innerHTML=`
  <div class="st">❄ AI Advisor</div>
  <p style="font-size:12px;color:var(--t2);opacity:0.65;margin-bottom:10px;font-style:italic">Your KC, collection log (${colObtained.size} items), and pets are passed to Claude automatically.</p>
  <div class="abox"><div class="arow"><input type="text" id="ai-in" placeholder="Ask anything..." value="${aiQ.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')askAI()"/><button class="btn" id="aibtn" onclick="askAI()">Ask ❄</button></div></div>
  <div id="airsp"></div>
  <div class="st" style="margin-top:12px">Quick Questions</div>
  ${QQS.map(q=>`<div class="qq" onclick="setQ('${q.replace(/'/g,"\\'")}')"><span>❄ ${q}</span></div>`).join("")}`;
}
function setQ(q){aiQ=q;const i=document.getElementById("ai-in");if(i)i.value=q;}
async function askAI(){
  const p=P();const inp=document.getElementById("ai-in");const q=inp?inp.value.trim():aiQ;if(!q)return;aiQ=q;
  const btn=document.getElementById("aibtn");if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  const kcS=BOSSES.map(b=>`${b.name}:${kc(b.id)}`).join(",");
  const mD=BOSSES.flatMap(b=>b.drops.filter(d=>!d.pet&&d.i&&!colObtained.has(d.i)).map(d=>`${d.n}(${b.name},${fmt(d.ge)})`)).join(",");
  const mP=BOSSES.flatMap(b=>b.drops.filter(d=>d.pet&&!p.pets[d.n]).map(d=>`${d.n}(${b.name})`)).join(",");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:`You are an expert OSRS advisor for a maxed main named "${activeRsn}" (ice/arctic theme). Collection log: ${colObtained.size} items obtained. Boss KC: ${kcS}. Missing boss drops: ${mD||"None"}. Missing pets: ${mP||"None"}. Give direct specific actionable advice with GP values and rates. Max 300 words. Plain text only.`,
        messages:[{role:"user",content:q}]})});
    const d=await r.json();const text=d.content?.[0]?.text||"No response.";
    const box=document.getElementById("airsp");
    if(box)box.innerHTML=`<div class="abox"><div class="albl">❄ RESPONSE</div><div class="aresp">${text.replace(/</g,"&lt;")}</div></div>`;
  }catch{const box=document.getElementById("airsp");if(box)box.innerHTML=`<div class="abox"><div class="aresp" style="color:var(--rd)">Error — please try again.</div></div>`;}
  finally{if(btn){btn.disabled=false;btn.innerHTML="Ask ❄";}}
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function rSettings(){
  document.getElementById("panel-settings").innerHTML=`
  <div class="st">❄ GitHub Gist Sync</div>
  <div style="border:1px solid var(--b2);border-radius:3px;padding:14px;background:rgba(7,21,37,0.8);margin-bottom:16px">
    <div class="gstep"><div class="gnum">1</div><div class="gtxt">Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a> → note "OSRS Dashboard" → expiry 1yr → tick only <code>gist</code> → Generate token</div></div>
    <div class="gstep"><div class="gnum">2</div><div class="gtxt">Paste below and Save Token. All data auto-syncs to a private Gist on every change.</div></div>
    <div class="gstep"><div class="gnum">3</div><div class="gtxt">Other devices: open your GitHub Pages URL → ⚙ Settings → paste same token + Gist ID → Load from Gist</div></div>
    <div class="gstep"><div class="gnum">4</div><div class="gtxt">Friends: open your GitHub Pages URL, enter their RSN, use their own token — data is fully separate</div></div>
  </div>
  <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--ac);letter-spacing:1px;margin-bottom:6px">GITHUB TOKEN</div>
  <div class="irow" style="padding:0;margin-bottom:10px"><input type="password" id="tokin" value="${gistToken}" placeholder="ghp_xxxx..."/><button class="btn" onclick="saveTok()">Save</button></div>
  ${gistToken?`<p style="font-size:11px;color:var(--gn);margin-bottom:8px">✓ Token saved</p>`:""}
  <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--ac);letter-spacing:1px;margin-bottom:6px;margin-top:8px">GIST ID <span style="color:var(--dm);font-size:9px">(auto-created on first save)</span></div>
  <div class="irow" style="padding:0;margin-bottom:12px"><input type="text" id="gistin" value="${gistId}" placeholder="Auto-created..."/><button class="btn" onclick="saveGid()">Set</button></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
    <button class="btn btn-green" onclick="saveToGist()">❄ Save Now</button>
    <button class="btn" onclick="loadFromGist()">↓ Load from Gist</button>
    <button class="btn btn-danger" onclick="clearTok()">Clear Token</button>
  </div>
  ${gistId?`<p style="font-size:11px;color:var(--t2);margin-bottom:16px">Gist ID: <code style="background:rgba(126,200,227,0.1);padding:2px 5px;border-radius:2px;color:var(--br)">${gistId}</code></p>`:""}

  <div class="st">❄ TempleOSRS Collection Log</div>
  <div style="border:1px solid var(--b2);border-radius:3px;padding:12px;background:rgba(7,21,37,0.7);margin-bottom:12px">
    <div class="gstep"><div class="gnum">1</div><div class="gtxt">Install <strong style="color:var(--br)">TempleOSRS</strong> plugin from RuneLite Plugin Hub</div></div>
    <div class="gstep"><div class="gnum">2</div><div class="gtxt">Open collection log in-game → click the TempleOSRS sync button</div></div>
    <div class="gstep"><div class="gnum">3</div><div class="gtxt">Go to <a href="https://templeosrs.com" target="_blank">templeosrs.com</a> → search your name → press <strong style="color:var(--br)">Update</strong></div></div>
    <div class="gstep"><div class="gnum">4</div><div class="gtxt">Press <strong style="color:var(--br)">↻ Col Log</strong> in the header — all ~1,700 items load automatically</div></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
    <button class="btn btn-green" onclick="syncColLog()">↻ Sync Collection Log</button>
    ${colSync?`<span style="font-size:11px;color:var(--gn)">✓ ${new Date(colSync).toLocaleString()}</span>`:`<span style="font-size:11px;color:var(--or)">Not synced — using WikiSync seed (${WSIDS.size} items)</span>`}
  </div>
  ${colCats?`<p style="font-size:11px;color:var(--gn);margin-bottom:16px">✓ ${Object.keys(colCats).length} categories loaded</p>`:`<p style="font-size:11px;color:var(--t2);margin-bottom:16px">Category data loads automatically on first sync</p>`}

  <div class="st">Profiles</div>
  ${Object.keys(profiles).map(n=>`<div class="ir${n===activeRsn?" ob":""}"><span class="in">${n}</span>${n===activeRsn?'<span style="font-size:10px;color:var(--gn)">● active</span>':''}</div>`).join("")}

  <div class="st" style="margin-top:16px">Danger Zone</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-danger" onclick="if(confirm('Reset pets?')){P().pets={};persist();sched();renderAll();ok('Done')}">Reset Pets</button>
    <button class="btn btn-danger" onclick="if(confirm('Clear col log cache?')){colCats=null;colItems=null;colSync=null;colObtained=new Set(WSIDS);persist();renderAll();ok('Cleared')}">Clear Col Log</button>
  </div>`;
}
function saveTok(){const v=document.getElementById("tokin")?.value?.trim();if(!v)return;gistToken=v;ls("gist_tok",v);ok("Token saved ✓");rSettings();}
function saveGid(){const v=document.getElementById("gistin")?.value?.trim();if(!v)return;gistId=v;ls("gist_id",v);ok("Gist ID saved ✓");rSettings();}
function clearTok(){gistToken="";gistId="";ls("gist_tok","");ls("gist_id","");ok("Cleared");rSettings();}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
renderProfiles();
document.getElementById("rsn").value=activeRsn;
if(gistToken)dot("ok");
renderAll();
refreshWOM();
</script>
</body>
</html>
