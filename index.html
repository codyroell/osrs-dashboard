<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Southp0le — OSRS PVM Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  :root {
    --ice-bg:#040d18; --ice-bg2:#071525; --ice-bg3:#0a1e30;
    --ice-border:#1a4a6a; --ice-border2:#2a6a9a;
    --ice-accent:#7ec8e3; --ice-bright:#b8ecff; --ice-dim:#4a8aaa; --ice-muted:#2a5a7a;
    --ice-text:#d0eeff; --ice-text2:#8ac4e0;
    --ice-frost:rgba(126,200,227,0.07); --ice-frost2:rgba(126,200,227,0.14);
    --ice-green:#50c878; --ice-green-bg:rgba(30,100,60,0.18);
    --ice-red:#e07070; --ice-red-bg:rgba(139,26,26,0.18);
    --ice-purple:#b090d8; --ice-gold:#d4a843;
  }
  body { font-family:'Crimson Pro',Georgia,serif; background:var(--ice-bg); min-height:100vh; color:var(--ice-text); overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at 15% 15%,rgba(126,200,227,0.05) 0%,transparent 55%),
      radial-gradient(ellipse at 85% 85%,rgba(100,160,220,0.04) 0%,transparent 55%),
      url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%237ec8e3' stroke-width='0.35' opacity='0.055'%3E%3Cpolygon points='40,4 54,19 54,35 40,45 26,35 26,19'/%3E%3Cline x1='40' y1='4' x2='40' y2='45'/%3E%3Cline x1='26' y1='19' x2='54' y2='35'/%3E%3Cline x1='54' y1='19' x2='26' y2='35'/%3E%3C/g%3E%3C/svg%3E") repeat; }
  #app { max-width:960px; margin:0 auto; padding:0 0 60px; position:relative; z-index:1; }

  .header { border-bottom:2px solid var(--ice-border2); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(90deg,rgba(4,13,24,0.96),rgba(7,21,37,0.96)); position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); box-shadow:0 2px 20px rgba(126,200,227,0.08); }
  .header-left { display:flex; align-items:center; gap:12px; }
  .header-crown { font-size:26px; filter:drop-shadow(0 0 8px rgba(126,200,227,0.7)); }
  .header-title { font-family:'Cinzel',serif; font-size:20px; font-weight:700; color:var(--ice-bright); letter-spacing:3px; text-transform:uppercase; text-shadow:0 0 18px rgba(126,200,227,0.5); }
  .header-sub { font-size:11px; color:var(--ice-dim); letter-spacing:1px; font-family:'Cinzel',serif; margin-top:3px; }
  .header-right { display:flex; align-items:center; gap:8px; }

  .welcome-banner { margin:10px 16px 0; padding:9px 14px; border:1px solid var(--ice-border2); border-radius:3px; background:linear-gradient(90deg,rgba(126,200,227,0.06),rgba(126,200,227,0.02)); font-family:'Cinzel',serif; font-size:11px; color:var(--ice-text2); letter-spacing:0.5px; text-align:center; }
  .welcome-banner strong { color:var(--ice-bright); font-size:13px; text-shadow:0 0 10px rgba(126,200,227,0.4); }

  .input-row { display:flex; gap:8px; padding:10px 16px 0; }
  input[type="text"] { flex:1; background:rgba(4,13,24,0.75); border:1px solid var(--ice-border); border-radius:3px; padding:8px 12px; color:var(--ice-text); font-family:'Crimson Pro',Georgia,serif; font-size:14px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  input[type="text"]:focus { border-color:var(--ice-accent); box-shadow:0 0 8px rgba(126,200,227,0.18); }
  .btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; padding:8px 16px; border:1px solid var(--ice-border2); background:var(--ice-frost2); color:var(--ice-bright); border-radius:3px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; white-space:nowrap; }
  .btn:hover { background:rgba(126,200,227,0.24); box-shadow:0 0 10px rgba(126,200,227,0.25); }
  .btn:disabled { opacity:0.4; cursor:default; }

  .tabs { display:flex; border-bottom:1px solid var(--ice-border); background:rgba(4,13,24,0.65); margin-top:10px; overflow-x:auto; }
  .tab { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:11px 0; cursor:pointer; border:none; flex:1; min-width:68px; background:transparent; color:var(--ice-dim); border-bottom:2px solid transparent; opacity:0.55; transition:all 0.2s; }
  .tab.active { opacity:1; border-bottom:2px solid var(--ice-accent); background:var(--ice-frost); color:var(--ice-bright); }
  .tab:hover { opacity:0.85; color:var(--ice-accent); }
  .panel { display:none; padding:16px; }
  .panel.active { display:block; }

  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  @media(max-width:500px){ .stat-grid{grid-template-columns:repeat(2,1fr);} }
  .stat-box { border:1px solid var(--ice-border); border-radius:3px; padding:10px 8px; text-align:center; background:var(--ice-frost); }
  .stat-num { font-family:'Cinzel',serif; font-size:18px; color:var(--ice-bright); font-weight:700; text-shadow:0 0 10px rgba(126,200,227,0.35); }
  .stat-label { font-size:10px; color:var(--ice-dim); letter-spacing:0.5px; margin-top:2px; }

  .progress-wrap { margin-bottom:9px; }
  .progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--ice-accent); margin-bottom:4px; font-family:'Cinzel',serif; letter-spacing:1px; }
  .progress-bar { height:5px; background:rgba(126,200,227,0.07); border-radius:3px; border:1px solid var(--ice-border); overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--ice-muted),var(--ice-accent),var(--ice-bright)); transition:width 0.6s ease; box-shadow:0 0 5px rgba(126,200,227,0.35); }

  .section-title { font-family:'Cinzel',serif; font-size:11px; color:var(--ice-accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--ice-border),transparent); }

  .filter-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
  .filter-btn { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.5px; padding:3px 9px; border:1px solid var(--ice-border); background:transparent; color:var(--ice-dim); border-radius:2px; cursor:pointer; opacity:0.6; transition:all 0.15s; }
  .filter-btn.active,.filter-btn:hover { opacity:1; background:var(--ice-frost2); border-color:var(--ice-accent); color:var(--ice-accent); }

  .boss-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
  @media(max-width:520px){ .boss-grid{grid-template-columns:1fr;} }
  .boss-card { border:1px solid var(--ice-border); border-radius:3px; padding:10px 10px 8px; background:rgba(7,21,37,0.55); transition:all 0.15s; position:relative; }
  .boss-card:hover { border-color:var(--ice-border2); }
  .boss-card.has-kc { border-color:#1a5a3a; background:rgba(10,36,24,0.35); }
  .boss-kc-badge { position:absolute; top:8px; right:8px; font-size:10px; font-family:'Cinzel',serif; padding:1px 6px; border-radius:2px; }
  .boss-kc-badge.has-kc { background:rgba(20,80,50,0.55); border:1px solid #1a5a3a; color:var(--ice-green); }
  .boss-kc-badge.no-kc  { background:rgba(10,30,50,0.45); border:1px solid var(--ice-border); color:var(--ice-dim); }
  .boss-name { font-family:'Cinzel',serif; font-size:11px; color:var(--ice-bright); font-weight:600; margin-bottom:1px; padding-right:62px; }
  .boss-cat  { font-size:10px; color:var(--ice-text2); opacity:0.65; margin-bottom:5px; }
  .boss-missing { font-size:10px; color:var(--ice-red); margin-bottom:3px; }
  .boss-drop { display:flex; justify-content:space-between; font-size:10px; padding:1px 0; gap:4px; }
  .boss-drop.obtained { color:var(--ice-green); opacity:0.75; text-decoration:line-through; }
  .boss-drop.missing  { color:var(--ice-text2); opacity:0.5; }
  .boss-drop.pet { color:var(--ice-purple); opacity:0.5; }
  .boss-drop.pet.obtained { color:var(--ice-purple); opacity:0.8; text-decoration:line-through; }
  .boss-drop-ge { opacity:0.5; white-space:nowrap; }

  .item-row { display:flex; align-items:center; gap:10px; padding:7px 10px; border:1px solid transparent; border-radius:3px; margin-bottom:3px; cursor:pointer; transition:all 0.15s; }
  .item-row:hover { border-color:var(--ice-border); background:var(--ice-frost); }
  .item-row.obtained { border-color:rgba(26,90,58,0.3); background:var(--ice-green-bg); }
  .checkbox { width:13px; height:13px; border:1px solid var(--ice-border); border-radius:2px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--ice-green); background:rgba(4,13,24,0.6); }
  .checkbox.checked { background:rgba(20,80,50,0.4); border-color:#1a6a3a; }
  .checkbox.pet-check { border-color:#4a2a7a; color:var(--ice-purple); }
  .checkbox.pet-check.checked { background:rgba(50,20,90,0.4); border-color:var(--ice-purple); }
  .item-name { font-size:13px; color:var(--ice-text); flex:1; }
  .item-name.obtained-text { color:var(--ice-text2); opacity:0.4; text-decoration:line-through; }
  .item-name.pet-name { color:var(--ice-purple); }
  .item-gp { font-size:11px; color:var(--ice-gold); opacity:0.75; white-space:nowrap; }
  .pill { font-size:9px; font-family:'Cinzel',serif; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .pill-ice    { border:1px solid rgba(126,200,227,0.3); background:rgba(126,200,227,0.08); color:var(--ice-accent); }
  .pill-green  { border:1px solid rgba(80,200,120,0.3); background:rgba(80,200,120,0.08); color:var(--ice-green); }
  .pill-purple { border:1px solid rgba(176,144,216,0.3); background:rgba(176,144,216,0.08); color:var(--ice-purple); }
  .pill-gold   { border:1px solid rgba(212,168,67,0.3); background:rgba(212,168,67,0.08); color:var(--ice-gold); }

  .tier-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:8px 0 3px; color:var(--ice-accent); opacity:0.7; margin-top:4px; }
  .divider { height:1px; background:linear-gradient(90deg,var(--ice-border),transparent); margin:10px 0; }

  .money-card { border:1px solid var(--ice-border); border-radius:3px; padding:10px 12px; background:rgba(7,21,37,0.45); margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; transition:all 0.15s; }
  .money-card:hover { border-color:var(--ice-border2); }
  .money-left { display:flex; align-items:center; gap:10px; flex:1; }
  .rank-circle { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:10px; flex-shrink:0; font-weight:700; }
  .money-name { font-family:'Cinzel',serif; font-size:11px; color:var(--ice-bright); }
  .money-sub  { font-size:10px; color:var(--ice-text2); opacity:0.7; }
  .money-right { text-align:right; }
  .money-gphr { font-family:'Cinzel',serif; font-size:13px; color:var(--ice-bright); }
  .money-missing { font-size:9px; color:var(--ice-red); }
  .money-value   { font-size:9px; color:var(--ice-gold); opacity:0.75; }

  .ai-box { border:1px solid var(--ice-border); border-radius:3px; padding:12px; margin-bottom:10px; background:rgba(4,13,24,0.55); }
  .ai-ask-row { display:flex; gap:8px; }
  .ai-response-label { font-size:10px; color:var(--ice-accent); font-family:'Cinzel',serif; letter-spacing:1px; margin-bottom:8px; opacity:0.8; }
  .ai-response { font-size:13px; line-height:1.75; color:var(--ice-text); white-space:pre-wrap; }
  .quick-q { display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid transparent; border-radius:3px; margin-bottom:4px; cursor:pointer; transition:all 0.15s; }
  .quick-q:hover { border-color:var(--ice-border); background:var(--ice-frost); }
  .quick-q span { font-size:12px; color:var(--ice-text2); }

  .error-box { margin:10px 16px; padding:12px 14px; color:var(--ice-red); font-family:'Cinzel',serif; font-size:12px; border:1px solid rgba(139,26,26,0.5); border-radius:3px; background:var(--ice-red-bg); }
  .spinner { width:16px; height:16px; border:2px solid var(--ice-border); border-top-color:var(--ice-accent); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .note { font-size:11px; color:var(--ice-muted); font-style:italic; margin-top:6px; }
  .search-bar { width:100%; background:rgba(4,13,24,0.65); border:1px solid var(--ice-border); border-radius:3px; padding:7px 11px; color:var(--ice-text); font-family:'Crimson Pro',Georgia,serif; font-size:13px; outline:none; margin-bottom:10px; transition:border-color 0.2s; }
  .search-bar:focus { border-color:var(--ice-accent); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">

  <div class="input-row">

    <button class="btn" onclick="loadPlayer()">Load Player</button>
  </div>
  <div id="error-box" class="error-box" style="display:none"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard',this)">Dashboard</button>

  <div id="panel-collection" class="panel"></div>
  <div id="panel-pets" class="panel"></div>
  <div id="panel-upgrades" class="panel"></div>
  <div id="panel-money" class="panel"></div>

</div>

function store(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem(k)||"null")}catch{return null}}try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
let playerData=null,catFilter="All",aiQuery="",lastUpdated=null;
let obtained=store("osrs_obtained")||{};
let gearObtained=store("osrs_gear")||{};
let petsObtained=store("osrs_pets")||{};

function fmt(n){return n>=1e9?(n/1e9).toFixed(2)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"K":String(n);}
function fmtKc(n){return n<=0?"—":n.toLocaleString();}
function getKc(id){const b=playerData?.latestSnapshot?.data?.bosses;if(!b)return 0;const v=b[id]?.kills??-1;return v<=0?0:v;}

async function fetchPlayer(name){
  if(!name)return;
  document.getElementById("spinner-header").style.display="inline-block";
  document.getElementById("error-box").style.display="none";
  try{
    await fetch(`${WOM_API}/${encodeURIComponent(name)}`,{method:"POST"}).catch(()=>{});
    const res=await fetch(`${WOM_API}/${encodeURIComponent(name)}`);
    if(!res.ok)throw new Error(`Player "${name}" not found on Wise Old Man.`);
    playerData=await res.json();lastUpdated=new Date();store("osrs_username",name);
    const totalKc=BOSS_META.reduce((s,b)=>s+getKc(b.id),0);
    document.getElementById("header-sub").textContent=`${playerData.displayName} · ${(playerData.type||"main").toUpperCase()} · EHB: ${Math.round(playerData.ehb||0)} · Total KC: ${totalKc.toLocaleString()} · Updated ${lastUpdated.toLocaleTimeString()}`;
    renderAll();
  }catch(e){
    document.getElementById("error-box").textContent="⚠ "+e.message;
    document.getElementById("error-box").style.display="block";renderAll();
  }finally{document.getElementById("spinner-header").style.display="none";}
}
function loadPlayer(){fetchPlayer(document.getElementById("rsn-input").value.trim());}
function refreshPlayer(){fetchPlayer(document.getElementById("rsn-input").value.trim());}

function renderDashboard(){
  BOSS_META.forEach(b=>b.drops.forEach(d=>d._bid=b.id));
  const tD=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>!d.pet).length,0);
  const oD=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>!d.pet&&obtained[b.id+":"+d.name]).length,0);
  const tP=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>d.pet).length,0);
  const oP=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>d.pet&&petsObtained[d.name]).length,0);
  const gD=GEAR_UPGRADES.filter(g=>gearObtained[g.name]).length;
  const bKc=BOSS_META.filter(b=>getKc(b.id)>0).length;
  const tKc=BOSS_META.reduce((s,b)=>s+getKc(b.id),0);
  const p1=Math.round(oD/tD*100),p2=Math.round(gD/GEAR_UPGRADES.length*100),p3=Math.round(oP/tP*100);
  const sq=(document.getElementById("dash-search")?.value||"").toLowerCase();
  const filt=(catFilter==="All"?BOSS_META:BOSS_META.filter(b=>b.cat===catFilter)).filter(b=>!sq||b.name.toLowerCase().includes(sq));
  let h=`<div class="stat-grid">
    <div class="stat-box"><div class="stat-num">${bKc}/${BOSS_META.length}</div><div class="stat-label">Bosses with KC</div></div>
    <div class="stat-box"><div class="stat-num">${tKc.toLocaleString()}</div><div class="stat-label">Total KC</div></div>
    <div class="stat-box"><div class="stat-num">${oD}/${tD}</div><div class="stat-label">Drops Obtained</div></div>
    <div class="stat-box"><div class="stat-num">${oP}/${tP}</div><div class="stat-label">Pets Obtained</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-label"><span>❄ Collection Log</span><span>${p1}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${p1}%"></div></div></div>
  <div class="progress-wrap"><div class="progress-label"><span>❄ BIS Gear</span><span>${p2}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${p2}%"></div></div></div>
  <div class="progress-wrap"><div class="progress-label"><span>❄ Pets</span><span>${p3}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${p3}%"></div></div></div>
  <input class="search-bar" id="dash-search" placeholder="❄ Search bosses..." value="${sq}" oninput="renderDashboard()"/>
  <div class="filter-row">${CATS.map(c=>`<button class="filter-btn${catFilter===c?" active":""}" onclick="setCat('${c}')">${c}</button>`).join("")}</div>
  <div class="boss-grid">${filt.map(b=>{
    const kc=getKc(b.id);const drops=b.drops.filter(d=>!d.pet);const pets=b.drops.filter(d=>d.pet);const miss=drops.filter(d=>!obtained[b.id+":"+d.name]).length;
    return `<div class="boss-card${kc>0?" has-kc":""}">
      <span class="boss-kc-badge ${kc>0?"has-kc":"no-kc"}">${kc>0?fmtKc(kc)+" KC":"0 KC"}</span>
      <div class="boss-name">${b.name}</div>
      <div class="boss-cat">${b.cat}${b.gphr>0?" · ~"+b.gphr+"M/hr":""}</div>
      ${miss>0?`<div class="boss-missing">❄ ${miss} drop${miss>1?"s":""} missing</div>`:""}
      <div>${drops.map(d=>`<div class="boss-drop ${obtained[b.id+":"+d.name]?"obtained":"missing"}"><span>${obtained[b.id+":"+d.name]?"✓ ":""}${d.name}</span>${d.ge>0?`<span class="boss-drop-ge">${fmt(d.ge)}</span>`:""}</div>`).join("")}${pets.map(d=>`<div class="boss-drop pet ${petsObtained[d.name]?"obtained":""}"><span>${petsObtained[d.name]?"✓ ":""}🐾 ${d.name}</span></div>`).join("")}</div>
    </div>`;
  }).join("")}</div>
  <p class="note" style="margin-top:8px">Live KC from Wise Old Man · Mark drops in Collection tab · Pets in Pets tab</p>`;
  document.getElementById("panel-dashboard").innerHTML=h;
}
function setCat(c){catFilter=c;renderDashboard();}

function renderCollection(sq){
  sq=sq||document.getElementById("col-search")?.value||"";const q=sq.toLowerCase();
  const tD=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>!d.pet).length,0);
  const oD=BOSS_META.reduce((s,b)=>s+b.drops.filter(d=>!d.pet&&obtained[b.id+":"+d.name]).length,0);
  const pct=Math.round(oD/tD*100);
  let h=`<div class="progress-wrap"><div class="progress-label"><span>❄ Key Uniques</span><span>${oD} / ${tD}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <input class="search-bar" id="col-search" placeholder="❄ Search drops..." value="${sq.replace(/"/g,'&quot;')}" oninput="renderCollection(this.value)"/>`;
  CATS.slice(1).forEach(cat=>{
    const ch=BOSS_META.filter(b=>b.cat===cat).map(b=>{
      const drops=b.drops.filter(d=>!d.pet&&(!q||d.name.toLowerCase().includes(q)||b.name.toLowerCase().includes(q)));
      if(!drops.length)return"";
      const kc=getKc(b.id);
      return `<div style="font-family:'Cinzel',serif;font-size:11px;color:var(--ice-accent);padding:4px 0 2px;opacity:0.85">${b.name} <span style="opacity:0.4">(${fmtKc(kc)} KC)</span></div>`+
        drops.map(d=>{const key=b.id+":"+d.name;const have=!!obtained[key];
          return `<div class="item-row${have?" obtained":""}" onclick="toggleObtained('${key}')"><div class="checkbox${have?" checked":""}">${have?"✓":""}</div><span class="item-name${have?" obtained-text":""}">${d.name}</span>${d.ge>0?`<span class="item-gp">${fmt(d.ge)}</span>`:""}<span class="pill pill-ice">${b.name}</span></div>`;
        }).join("");
    }).join("");
    if(ch)h+=`<div class="tier-label">${cat}</div>${ch}<div class="divider"></div>`;
  });
  h+=`<p class="note">Click to mark obtained · Saves in your browser automatically</p>`;
  document.getElementById("panel-collection").innerHTML=h;
}
function toggleObtained(key){obtained[key]=!obtained[key];store("osrs_obtained",obtained);renderAll();}

function renderPets(){
  const all=BOSS_META.flatMap(b=>b.drops.filter(d=>d.pet).map(d=>({...d,boss:b.name,cat:b.cat,bossId:b.id})));
  const tot=all.length,got=all.filter(p=>petsObtained[p.name]).length,pct=Math.round(got/tot*100);
  let h=`<div class="progress-wrap"><div class="progress-label"><span>🐾 Pets Obtained</span><span>${got} / ${tot}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
  CATS.slice(1).forEach(cat=>{
    const pets=all.filter(p=>p.cat===cat);if(!pets.length)return;
    h+=`<div class="tier-label">${cat}</div>`;
    pets.forEach(p=>{const have=!!petsObtained[p.name];const kc=getKc(p.bossId);
      h+=`<div class="item-row pet-row${have?" obtained":""}" onclick="togglePet('${p.name.replace(/'/g,"\\'")}')"><div class="checkbox pet-check${have?" checked":""}">${have?"✓":""}</div><span class="item-name pet-name${have?" obtained-text":""}">${p.name}</span>${kc>0?`<span style="font-size:10px;color:var(--ice-dim);opacity:0.65">${fmtKc(kc)} KC</span>`:""}<span class="pill pill-purple">${p.boss}</span></div>`;
    });
  });
  h+=`<p class="note" style="margin-top:6px">🐾 Good luck on the drops, Southp0le! · Click to mark obtained</p>`;
  document.getElementById("panel-pets").innerHTML=h;
}
function togglePet(name){petsObtained[name]=!petsObtained[name];store("osrs_pets",petsObtained);renderAll();}

function renderGear(){
  const gD=GEAR_UPGRADES.filter(g=>gearObtained[g.name]).length,pct=Math.round(gD/GEAR_UPGRADES.length*100);
  const mv=GEAR_UPGRADES.filter(g=>!gearObtained[g.name]).reduce((s,g)=>s+g.ge,0);
  let h=`<div class="progress-wrap"><div class="progress-label"><span>❄ BIS Gear</span><span>${gD} / ${GEAR_UPGRADES.length}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <p style="font-size:11px;color:var(--ice-gold);opacity:0.75;margin-bottom:12px;font-style:italic">Total missing gear value: ~${fmt(mv)} GP</p>`;
  [{t:1,l:"Core Upgrades"},{t:2,l:"Raid & Major Upgrades"},{t:3,l:"End-Game BIS"}].forEach(({t,l})=>{
    h+=`<div class="tier-label">${l}</div>`;
    GEAR_UPGRADES.filter(g=>g.priority===t).forEach(g=>{const have=!!gearObtained[g.name];
      h+=`<div class="item-row${have?" obtained":""}" onclick="toggleGear('${g.name.replace(/'/g,"\\'")}')"><div class="checkbox${have?" checked":""}">${have?"✓":""}</div><span class="item-name${have?" obtained-text":""}">${g.name}</span><span class="pill pill-green">${g.slot}</span><span class="item-gp">${fmt(g.ge)}</span></div>`;
    });
  });
  h+=`<p class="note" style="margin-top:6px">Click to toggle · All progress saves locally</p>`;
  document.getElementById("panel-upgrades").innerHTML=h;
}
function toggleGear(name){gearObtained[name]=!gearObtained[name];store("osrs_gear",gearObtained);renderAll();}

function renderMoney(){
  const ranked=[...BOSS_META].filter(b=>b.gphr>0).map(b=>{
    const kc=getKc(b.id),miss=b.drops.filter(d=>!d.pet&&!obtained[b.id+":"+d.name]),mv=miss.reduce((s,d)=>s+d.ge,0);
    return {...b,kc,miss,mv,score:b.gphr*(mv>0?1.5:1)};
  }).sort((a,b)=>b.score-a.score);
  const rc=["#d4a843","#a0a0a0","#c07840"];
  let h=`<div class="section-title">❄ GP/hr Priority — Southp0le</div>
  <p style="font-size:11px;color:var(--ice-text2);opacity:0.65;margin-bottom:12px;font-style:italic">Bosses with missing drops weighted higher · Assumes Tbow / Scythe / Shadow BIS</p>`;
  ranked.forEach((b,i)=>{
    const c=i<3?rc[i]:"rgba(26,74,106,0.55)",tc=i<3?"#f0f0f0":"var(--ice-accent)";
    h+=`<div class="money-card"><div class="money-left"><div class="rank-circle" style="background:${c};color:${tc}">${i+1}</div><div><div class="money-name">${b.name}</div><div class="money-sub">${b.kc>0?fmtKc(b.kc)+" KC · ":"No KC · "}${b.cat}</div></div></div><div class="money-right"><div class="money-gphr">~${b.gphr}M/hr</div>${b.miss.length>0?`<div class="money-missing">${b.miss.length} unique${b.miss.length>1?"s":""} missing</div>`:""}${b.mv>0?`<div class="money-value">${fmt(b.mv)} in drops</div>`:""}</div></div>`;
  });
  document.getElementById("panel-money").innerHTML=h;
}

function renderAdvisor(){
  document.getElementById("panel-advisor").innerHTML=`
  <div class="section-title">❄ AI Advisor — Powered by Claude</div>
  <p style="font-size:12px;color:var(--ice-text2);opacity:0.65;margin-bottom:12px;font-style:italic">Your live KC, missing drops, pets and gear are passed to Claude automatically.</p>
  <div class="ai-box"><div class="ai-ask-row"><input type="text" id="ai-input" placeholder="Ask Claude anything about your account..." value="${aiQuery.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')askAI()"/><button class="btn" id="ask-btn" onclick="askAI()">Ask ❄</button></div></div>
  <div id="ai-response-box"></div>
  <div class="section-title" style="margin-top:12px">Quick Questions</div>
  ${QUICK_QS.map(q=>`<div class="quick-q" onclick="setAiQ('${q.replace(/'/g,"\\'")}')"><span>❄ ${q}</span></div>`).join("")}`;
}
function setAiQ(q){aiQuery=q;const i=document.getElementById("ai-input");if(i)i.value=q;}
async function askAI(){
  const inp=document.getElementById("ai-input");const q=inp?inp.value.trim():aiQuery;if(!q)return;aiQuery=q;
  const btn=document.getElementById("ask-btn");if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}
  const kcS=BOSS_META.map(b=>`${b.name}:${getKc(b.id)}`).join(",");
  const mD=BOSS_META.flatMap(b=>b.drops.filter(d=>!d.pet&&!obtained[b.id+":"+d.name]).map(d=>`${d.name}(${b.name},~${fmt(d.ge)}GP)`)).join(",");
  const mG=GEAR_UPGRADES.filter(g=>!gearObtained[g.name]).map(g=>`${g.name}(~${fmt(g.ge)}GP)`).join(",");
  const mP=BOSS_META.flatMap(b=>b.drops.filter(d=>d.pet&&!petsObtained[d.name]).map(d=>`${d.name}(${b.name})`)).join(",");
  const rsn=document.getElementById("rsn-input")?.value||"Southp0le";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:`You are an expert OSRS advisor for a maxed main account named "${rsn}" (ice/arctic themed player). They own a Twisted Bow, Scythe of Vitur, and Tumeken's Shadow. Boss KC: ${kcS}. Missing drops: ${mD||"None"}. Missing gear: ${mG||"None"}. Missing pets: ${mP||"None"}. Give direct specific actionable advice with GP values and rates. Max 300 words. Plain text only.`,
        messages:[{role:"user",content:q}]})});
    const data=await res.json();const text=data.content?.[0]?.text||"No response.";
    const box=document.getElementById("ai-response-box");
    if(box)box.innerHTML=`<div class="ai-box"><div class="ai-response-label">❄ ADVISOR RESPONSE</div><div class="ai-response">${text.replace(/</g,"&lt;")}</div></div>`;
  }catch(e){
    const box=document.getElementById("ai-response-box");
    if(box)box.innerHTML=`<div class="ai-box"><div class="ai-response" style="color:var(--ice-red)">Error reaching AI — please try again.</div></div>`;
  }finally{if(btn){btn.disabled=false;btn.innerHTML="Ask ❄";}}
}

const savedRsn=store("osrs_username");
if(savedRsn)document.getElementById("rsn-input").value=savedRsn;
renderAll();
fetchPlayer(document.getElementById("rsn-input").value||"Southp0le");
</script>
</body>
</html>
